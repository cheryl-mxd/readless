services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Allow local dev frontends by default. Override in your `.env` for production.
      READLESS_WEB_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api

