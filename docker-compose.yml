services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Allow browser clients when you access the frontend directly.
      READLESS_WEB_ORIGINS: "${READLESS_WEB_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: "${API_INTERNAL_URL:-http://api:8000}"
    environment:
      API_INTERNAL_URL: "${API_INTERNAL_URL:-http://api:8000}"
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

